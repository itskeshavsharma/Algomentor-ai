<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | AlgoMentor AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo"><i class="fas fa-brain"></i><span>AlgoMentor AI</span></div>
            <ul class="nav-links">
                <li><a href="index.html"><i class="fas fa-th-large"></i><span>Dashboard</span></a></li>
                <li><a href="history.html"><i class="fas fa-history"></i><span>History</span></a></li>
                <li><a href="study.html"><i class="fas fa-book-open"></i><span>Study Room</span></a></li>
                <li class="active"><a href="profile.html"><i class="fas fa-user"></i><span>Profile</span></a></li>
            </ul>
            <div class="sidebar-footer"><p><small>© 2026 AlgoMentor AI</small></p></div>
        </nav>

        <main class="main-content">
            <header>
                <h2>Profile</h2>
                <div class="user-pill">
                    <span id="header-username">Learner</span>
                    <img id="header-avatar" class="avatar" src="https://via.placeholder.com/30" alt="avatar">
                </div>
            </header>
            <section class="content-section">
                <div class="profile-container">
                    <div class="profile-card card">
                        <div class="profile-header">
                            <div class="image-preview-wrapper">
                                <img id="profile-preview" src="https://via.placeholder.com/100" alt="Preview">
                                <label for="profImg" class="upload-badge"><i class="fas fa-camera"></i></label>
                            </div>
                            <h3 id="display-name">User Name</h3>
                            <span class="user-status">Pro Member</span>
                        </div>
                        <div class="profile-details">
                            <div class="detail-item"><i class="fas fa-envelope"></i><span>keshav@algomentor.ai</span></div>
                            <div class="detail-item"><i class="fas fa-calendar-alt"></i><span id="display-dob">Not Set</span></div>
                        </div>
                    </div>
                    <div class="edit-card card">
                        <h3>Account Settings</h3>
                        <div class="form-grid">
                            <div class="input-group"><label>Change Profile Picture</label><input type="file" id="profImg" accept="image/*" onchange="previewImage(event)"></div>
                            <div class="input-group"><label>Full Name</label><input type="text" id="profName" placeholder="Enter your name"></div>
                            <div class="input-group"><label>Date of Birth</label><input type="date" id="profDOB"></div>
                            <button class="save-btn" onclick="saveProfile()"><i class="fas fa-save"></i> Save Changes</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
