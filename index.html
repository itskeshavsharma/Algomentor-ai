<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoMentor AI | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo"><i class="fas fa-brain"></i><span>AlgoMentor AI</span></div>
            <ul class="nav-links">
                <li class="active"><a href="index.html"><i class="fas fa-th-large"></i><span>Dashboard</span></a></li>
                <li><a href="history.html"><i class="fas fa-history"></i><span>History</span></a></li>
                <li><a href="study.html"><i class="fas fa-book-open"></i><span>Study Room</span></a></li>
                <li><a href="profile.html"><i class="fas fa-user"></i><span>Profile</span></a></li>
            </ul>
            <div class="sidebar-footer"><p><small>© 2026 AlgoMentor AI</small></p></div>
        </nav>

        <main class="main-content">
            <header>
                <h2>Dashboard</h2>
                <div class="user-pill" onclick="window.location.href='profile.html'">
                    <span id="header-username">Learner</span>
                    <img id="header-avatar" class="avatar" src="https://via.placeholder.com/30" alt="avatar">
                </div>
            </header>

            <section id="dashboard" class="content-section">
                <div class="stats-grid">
                    <div class="stat-card gradient-1">
                        <div class="stat-info"><h3>Queries Solved</h3><p id="stat-count">0</p></div>
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-card gradient-2">
                        <div class="stat-info"><h3>Focus Topics</h3><p>Arrays, Trees, DP</p></div>
                        <i class="fas fa-fire"></i>
                    </div>
                </div>

                <div class="ai-interaction-card">
                    <h3><i class="fas fa-robot"></i> Ask your DSA Instructor</h3>
                    <textarea id="userInput" placeholder="Ask a DSA question..."></textarea>
                    <div class="action-bar" style="margin-top: 20px;">
                        <button id="askBtn" onclick="askInstructor()"><span>Ask Instructor</span><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>

                <div id="loading" class="response-card hidden" style="border-left: 5px solid var(--accent); margin-bottom: 20px;">
                    <div style="display: flex; align-items: center; gap: 12px; padding: 5px;">
                        <i class="fas fa-brain" style="color: var(--accent); font-size: 1.2rem; animation: pulse 1.5s infinite;"></i>
                        <span style="font-weight: 600; font-size: 1.1rem;">Thinking<span class="animated-dots"></span></span>
                    </div>
                </div>

                <div id="responseContainer" class="response-card hidden">
                    <div class="response-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <span class="badge" style="display: flex; align-items: center; gap: 8px;"><i class="fas fa-robot"></i> AI Response</span>
                        <button onclick="copyResponse()" style="background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem;"><i class="far fa-copy"></i></button>
                    </div>
                    <div id="aiResponse" class="markdown-body"></div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
